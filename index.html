<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Степану Вотякову — Dota 2 поздравления</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0e1a2a 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* декоративный элемент в стиле Dota (руны) */
        body::before {
            content: "⚔️";
            font-size: 12rem;
            opacity: 0.03;
            position: absolute;
            bottom: 0;
            right: 0;
            pointer-events: none;
            transform: rotate(-15deg);
        }

        body::after {
            content: "🛡️";
            font-size: 10rem;
            opacity: 0.03;
            position: absolute;
            top: 10%;
            left: 5%;
            pointer-events: none;
        }

        .card {
            max-width: 550px;
            width: 100%;
            background: rgba(20, 25, 40, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 1.8rem 1.8rem 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 215, 100, 0.2);
            transition: all 0.2s ease;
            text-align: center;
        }

        /* рамка для фото */
        .photo-frame {
            width: 180px;
            height: 180px;
            margin: 0 auto 1.2rem;
            border-radius: 50%;
            background: linear-gradient(145deg, #ffd966, #b8860b);
            padding: 4px;
            box-shadow: 0 12px 20px -8px black;
        }

        .photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #1e2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* именно сюда вставишь фото */
        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* заглушка, если фото ещё не добавлено */
        .photo-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, #2c3e4e, #1a2a36);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #ffd966aa;
            font-size: 0.8rem;
            text-align: center;
            border-radius: 50%;
        }

        .photo-placeholder i {
            font-size: 2.6rem;
        }

        /* имя */
        .name {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(120deg, #FFE6B0, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.3rem;
        }

        .title {
            font-size: 0.85rem;
            color: #ccb87c;
            margin-bottom: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 200, 100, 0.15);
            padding: 0.2rem 1rem;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        /* блок поздравления */
        .wish-container {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 2rem;
            padding: 1.2rem;
            margin: 1rem 0 1.5rem;
            border-left: 4px solid #ffb347;
        }

        .wish-text {
            font-size: 1.25rem;
            line-height: 1.4;
            font-weight: 500;
            color: #f5e7cf;
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .dota-icon {
            font-size: 1.6rem;
            margin-bottom: 0.4rem;
            color: #ffb347;
        }

        /* кнопка смены */
        .change-btn {
            background: #ffb347;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            color: #1a2a2f;
            box-shadow: 0 6px 0 #a45d1a;
            transform: translateY(-2px);
        }

        .change-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #a45d1a;
        }

        /* маленький футер */
        .footer-note {
            margin-top: 2rem;
            font-size: 0.7rem;
            opacity: 0.7;
            color: #bba87a;
        }

        /* адаптация под телефон */
        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }
            .card {
                padding: 1.5rem;
            }
            .photo-frame {
                width: 140px;
                height: 140px;
            }
            .name {
                font-size: 1.5rem;
            }
            .wish-text {
                font-size: 1rem;
            }
            .change-btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
    <!-- Font Awesome для иконок (необязательно, но красиво) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="card">
    <!-- ФОТО СТЕПАНА (место для вставки) -->
    <div class="photo-frame">
        <div class="photo" id="steamPhoto">
            <!-- ⬇⬇⬇ ЗДЕСЬ ВСТАВЬ ФОТКУ СТЕПАНА ⬇⬇⬇ -->
            <!-- Просто замени содержимое на <img src="твоя_фотка.jpg" alt="Степан Вотяков"> -->
            <img src="image/stepan.jpg" alt="Степан Вотяков">
            <!-- Пример с реальным фото (раскомментировать и убрать placeholder):
            <img src="stepan.jpg" alt="Степан Вотяков">
            -->
        </div>
    </div>

    <div class="name">Степан Вотяков</div>
    <div class="title">
        <i class="fas fa-tower-broadcast"></i> MMR booster <i class="fas fa-gamepad"></i>
    </div>

    <!-- Блок с поздравлением (будет меняться) -->
    <div class="wish-container">
        <div class="dota-icon">
            <i class="fas fa-dice-d20"></i>
        </div>
        <div class="wish-text" id="wishMessage">
            Желаю тебе только победных рапир и чтобы враги сдавались до 10 минуты!
        </div>
    </div>

    <!-- Кнопка генерации нового поздравления -->
    <button class="change-btn" id="newWishBtn">
        <i class="fas fa-sync-alt"></i> Сменить пожелание
    </button>

    <div class="footer-note">
        <i class="fas fa-skull"></i> Dota 2 style <i class="fas fa-heart"></i>
    </div>
</div>

<script>
    // Коллекция дотовых поздравлений (шутки, герои, фразы)
    const dotaWishes = [
        "Пусть твой MMR растёт быстрее, чем скорость атаки Troll Warlord!",
        "Желаю, чтобы крипы всегда добивались сами, а враги фейлили ульты.",
        "Пусть твоя команда будет как Team Spirit на TI — сплочённой и чемпионской!",
        "Желаю, чтобы каждый твой Roshan приносил Aegis и вторую жизнь в любых делах.",
        "Пусть твоя жизнь будет как покупка Divine Rapier — рискованно, но эпично и с победой!",
        "Чтобы вражеский Pudge всегда промахивался хуком, а твой — ловил идеально.",
        "Желаю тебе +25 к удаче каждый день и чтобы не было враждебных пиков!",
        "Пусть все твои начинания заканчиваются RAMPAGE, а тильт обходит стороной!",
        "Желаю, чтобы поддержка в жизни была как Omniknight — всегда вовремя омолодит и спасёт.",
        "Пусть твой фарм будет быстрее, чем у Alchemist с радаром, а враги всегда недооценивают!",
        "Желаю тебе ульту на всё: здоровье, счастье, удачу — и никакого отката!",
        "Чтобы каждый день дарил тебе новую руну: двойной урон, иллюзии, неуязвимость и удачу!",
        "Степан, будь легендой, как Miracle- и чтобы хейтеры сами себе вангу втыкали!"
    ];

    // Элементы
    const wishEl = document.getElementById('wishMessage');
    const btn = document.getElementById('newWishBtn');

    // Функция смены поздравления
    function changeWish() {
        const randomIndex = Math.floor(Math.random() * dotaWishes.length);
        const newWish = dotaWishes[randomIndex];
        wishEl.textContent = newWish;
        // маленькая анимация для плавности
        wishEl.style.opacity = '0';
        setTimeout(() => {
            wishEl.style.opacity = '1';
        }, 50);
    }

    // Добавляем переход для плавности
    wishEl.style.transition = 'opacity 0.15s ease';

    // Вешаем событие на кнопку
    btn.addEventListener('click', changeWish);

    // Для разнообразия, при загрузке тоже случайное пожелание
    changeWish();

    // Подсказка для фото (чтобы пользователь понял, куда вставлять)
    const photoDiv = document.getElementById('steamPhoto');
    if (photoDiv && photoDiv.querySelector('.photo-placeholder')) {
        photoDiv.addEventListener('click', () => {
            const placeholder = photoDiv.querySelector('.photo-placeholder');
            if (placeholder) {
                const oldHtml = placeholder.innerHTML;
                placeholder.innerHTML = '<i class="fas fa-upload"></i><span>вставь фото</span><span style="font-size:0.65rem;">(замени на img)</span>';
                setTimeout(() => {
                    if (photoDiv.querySelector('.photo-placeholder')) {
                        placeholder.innerHTML = oldHtml;
                    }
                }, 2000);
            }
        });
    }
</script>

<!-- 
    ИНСТРУКЦИЯ ПО ВСТАВКЕ ФОТО СТЕПАНА:
    Найди внутри .photo блок с id="steamPhoto". Там сейчас заглушка .photo-placeholder.
    Чтобы добавить реальное фото:
        1. Удали div.photo-placeholder целиком.
        2. Вставь вместо него тег: <img src="путь_к_твоей_фотке.jpg" alt="Степан Вотяков">
    Пример:
        <img src="stepan.jpg" alt="Степан Вотяков">
    Фото автоматически подстроится по размеру в круглую рамку.
-->
</body>
</html>
